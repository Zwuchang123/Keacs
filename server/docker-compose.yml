services:
  keacs-agent:
    build:
      context: .
    restart: unless-stopped
    environment:
      KEACS_MODEL_PROVIDER: ${KEACS_MODEL_PROVIDER:-openai_compatible}
      KEACS_MODEL_BASE_URL: ${KEACS_MODEL_BASE_URL:-https://api.minimax.io/v1}
      KEACS_MODEL_API_KEY: ${KEACS_MODEL_API_KEY}
      KEACS_MODEL_NAME: ${KEACS_MODEL_NAME:-MiniMax-M2.7}
      KEACS_MODEL_REASONING_SPLIT: ${KEACS_MODEL_REASONING_SPLIT:-true}
      KEACS_AUDIT_DB_PATH: /data/audit.sqlite3
      KEACS_RATE_LIMIT_PER_MINUTE: ${KEACS_RATE_LIMIT_PER_MINUTE:-20}
      KEACS_RATE_LIMIT_PER_DAY: ${KEACS_RATE_LIMIT_PER_DAY:-200}
      KEACS_MAX_MESSAGE_LENGTH: ${KEACS_MAX_MESSAGE_LENGTH:-1000}
      KEACS_MAX_CONTEXT_ITEMS: ${KEACS_MAX_CONTEXT_ITEMS:-10000}
      KEACS_MODEL_REQUEST_TIMEOUT_SECONDS: ${KEACS_MODEL_REQUEST_TIMEOUT_SECONDS:-90}
      KEACS_MODEL_MAX_RETRIES: ${KEACS_MODEL_MAX_RETRIES:-2}
      KEACS_MODEL_MAX_COMPLETION_TOKENS: ${KEACS_MODEL_MAX_COMPLETION_TOKENS:-1600}
    volumes:
      - keacs-agent-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      keacs-agent:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      KEACS_AGENT_DOMAIN: ${KEACS_AGENT_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  keacs-agent-data:
  caddy-data:
  caddy-config:
