<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keacs 分类与账户图标库</title>
  <style>
    :root {
      --primary: #3f82f6;
      --background: #f6f8fc;
      --surface: #fcfdff;
      --text: #1f2937;
      --text-2: #6b7280;
      --border: #e6ebf2;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .canvas {
      width: 1440px;
      padding: 36px 48px 44px;
      margin: 0 auto;
    }

    .heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 26px;
      font-size: 34px;
      font-weight: 700;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--primary);
      color: #fbfdff;
      display: grid;
      place-items: center;
      font-size: 34px;
      box-shadow: var(--shadow);
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 24px 26px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 20px;
      line-height: 28px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px 16px;
    }

    .item {
      display: grid;
      justify-items: center;
      gap: 8px;
      color: var(--text-2);
      font-size: 13px;
      line-height: 18px;
    }

    .circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fbfdff;
    }

    .circle svg {
      width: 25px;
      height: 25px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .orange { background: #ffb45f; }
    .blue { background: #61a5ff; }
    .green { background: #4fc78b; }
    .purple { background: #b88cff; }
    .red { background: #ff7b7f; }
    .yellow { background: #ffbf3f; }
    .cyan { background: #4fc3d7; }
    .indigo { background: #7d91ff; }
    .pink { background: #ef7dc8; }
    .gray { background: #9aa4b2; }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <symbol id="food" viewBox="0 0 24 24"><path d="M7 3v18M5 3v7a2 2 0 0 0 4 0V3M15 3v18M15 3c3 1 4 4 4 7v1h-4"/></symbol>
    <symbol id="bus" viewBox="0 0 24 24"><path d="M6 17h12M7 20h0M17 20h0M6 6h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2ZM7 10h10"/></symbol>
    <symbol id="bag" viewBox="0 0 24 24"><path d="M6 8h12l-1 12H7L6 8ZM9 8a3 3 0 0 1 6 0"/></symbol>
    <symbol id="home" viewBox="0 0 24 24"><path d="m4 11 8-7 8 7M6 10v10h12V10M10 20v-6h4v6"/></symbol>
    <symbol id="game" viewBox="0 0 24 24"><path d="M8 14h.01M6 12h4M16 13h.01M18 15h.01M7 18h10a4 4 0 0 0 4-4 5 5 0 0 0-5-5H8a5 5 0 0 0-5 5 4 4 0 0 0 4 4Z"/></symbol>
    <symbol id="phone" viewBox="0 0 24 24"><path d="M8 3h8a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1ZM11 18h2"/></symbol>
    <symbol id="medical" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14M7 7h10v10H7z"/></symbol>
    <symbol id="school" viewBox="0 0 24 24"><path d="m3 9 9-5 9 5-9 5-9-5ZM7 12v4c3 2 7 2 10 0v-4"/></symbol>
    <symbol id="chart" viewBox="0 0 24 24"><path d="M5 19V9M12 19V5M19 19v-7"/></symbol>
    <symbol id="bolt" viewBox="0 0 24 24"><path d="m13 3-8 11h6l-1 7 8-11h-6l1-7Z"/></symbol>
    <symbol id="heart" viewBox="0 0 24 24"><path d="M12 20s-8-5-8-11a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 6-8 11-8 11Z"/></symbol>
    <symbol id="more" viewBox="0 0 24 24"><path d="M6 12h.01M12 12h.01M18 12h.01"/></symbol>
    <symbol id="work" viewBox="0 0 24 24"><path d="M8 7V5h8v2M4 8h16v11H4zM9 13h6"/></symbol>
    <symbol id="gift" viewBox="0 0 24 24"><path d="M4 9h16v11H4zM12 9v11M4 13h16M8 9c-3-3 1-6 4 0M16 9c3-3-1-6-4 0"/></symbol>
    <symbol id="receipt" viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3ZM9 8h6M9 12h6M9 16h3"/></symbol>
    <symbol id="coins" viewBox="0 0 24 24"><path d="M7 7c0 2 10 2 10 0S7 5 7 7Zm0 0v4c0 2 10 2 10 0V7M7 11v4c0 2 10 2 10 0v-4"/></symbol>
    <symbol id="hand" viewBox="0 0 24 24"><path d="M5 14h4l3 3 5-8a2 2 0 0 1 3 2l-5 8H9l-4-3v-2Z"/></symbol>
    <symbol id="wallet" viewBox="0 0 24 24"><path d="M4 7h14a2 2 0 0 1 2 2v10H4zM4 7l12-3v3M15 13h5M17 13h0"/></symbol>
    <symbol id="bank" viewBox="0 0 24 24"><path d="m3 9 9-5 9 5M5 9h14M7 9v9M12 9v9M17 9v9M4 20h16"/></symbol>
    <symbol id="card" viewBox="0 0 24 24"><path d="M4 6h16v12H4zM4 10h16M8 15h3"/></symbol>
    <symbol id="loan" viewBox="0 0 24 24"><path d="M7 18h10M8 6h8l2 5H6l2-5ZM6 11h12l-1 7H7l-1-7Z"/></symbol>
  </svg>

  <main class="canvas">
    <div class="heading"><div class="logo">¥</div><div>Keacs 分类与账户图标库</div></div>

    <section class="section">
      <div class="section-title">支出分类图标</div>
      <div class="grid">
        <div class="item"><div class="circle orange"><svg><use href="#food"/></svg></div><span>餐饮</span></div>
        <div class="item"><div class="circle blue"><svg><use href="#bus"/></svg></div><span>交通</span></div>
        <div class="item"><div class="circle green"><svg><use href="#bag"/></svg></div><span>购物</span></div>
        <div class="item"><div class="circle cyan"><svg><use href="#home"/></svg></div><span>住房</span></div>
        <div class="item"><div class="circle yellow"><svg><use href="#bolt"/></svg></div><span>水电煤</span></div>
        <div class="item"><div class="circle purple"><svg><use href="#game"/></svg></div><span>娱乐</span></div>
        <div class="item"><div class="circle indigo"><svg><use href="#phone"/></svg></div><span>通讯</span></div>
        <div class="item"><div class="circle red"><svg><use href="#medical"/></svg></div><span>医疗</span></div>
        <div class="item"><div class="circle yellow"><svg><use href="#school"/></svg></div><span>教育</span></div>
        <div class="item"><div class="circle green"><svg><use href="#chart"/></svg></div><span>投资</span></div>
        <div class="item"><div class="circle pink"><svg><use href="#heart"/></svg></div><span>人情</span></div>
        <div class="item"><div class="circle gray"><svg><use href="#more"/></svg></div><span>其他</span></div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">收入分类图标</div>
      <div class="grid">
        <div class="item"><div class="circle blue"><svg><use href="#work"/></svg></div><span>工资</span></div>
        <div class="item"><div class="circle yellow"><svg><use href="#gift"/></svg></div><span>奖金</span></div>
        <div class="item"><div class="circle green"><svg><use href="#receipt"/></svg></div><span>报销</span></div>
        <div class="item"><div class="circle purple"><svg><use href="#chart"/></svg></div><span>理财收益</span></div>
        <div class="item"><div class="circle orange"><svg><use href="#gift"/></svg></div><span>礼金</span></div>
        <div class="item"><div class="circle cyan"><svg><use href="#coins"/></svg></div><span>兼职</span></div>
        <div class="item"><div class="circle red"><svg><use href="#hand"/></svg></div><span>退款</span></div>
        <div class="item"><div class="circle gray"><svg><use href="#more"/></svg></div><span>其他</span></div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">账户图标</div>
      <div class="grid">
        <div class="item"><div class="circle green"><svg><use href="#wallet"/></svg></div><span>现金</span></div>
        <div class="item"><div class="circle blue"><svg><use href="#wallet"/></svg></div><span>支付宝</span></div>
        <div class="item"><div class="circle cyan"><svg><use href="#wallet"/></svg></div><span>微信</span></div>
        <div class="item"><div class="circle indigo"><svg><use href="#bank"/></svg></div><span>银行卡</span></div>
        <div class="item"><div class="circle orange"><svg><use href="#card"/></svg></div><span>信用卡</span></div>
        <div class="item"><div class="circle yellow"><svg><use href="#card"/></svg></div><span>花呗白条</span></div>
        <div class="item"><div class="circle purple"><svg><use href="#home"/></svg></div><span>公积金</span></div>
        <div class="item"><div class="circle pink"><svg><use href="#chart"/></svg></div><span>投资账户</span></div>
        <div class="item"><div class="circle red"><svg><use href="#loan"/></svg></div><span>借款</span></div>
        <div class="item"><div class="circle gray"><svg><use href="#more"/></svg></div><span>其他</span></div>
      </div>
    </section>
  </main>
</body>
</html>
